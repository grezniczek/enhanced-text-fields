desc_at_css = "CSS editor for text/Notes fields. Params: initial, height, format, indent, scope, css-only. See documentation."
desc_at_ini = "INI editor for Notes fields. Params: initial, height, scope, ini-only. See documentation."
desc_at_r = "R editor for Notes fields. Params: initial, height, scope, r-only. See documentation."
desc_at_xml = "XML editor for text/Notes fields. Params: initial, height, format, indent, scope, xml-only. See documentation."
desc_at_yaml = "YAML editor for Notes fields. Params: initial, height, scope, yaml-only. See documentation."
